<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>慢慢戒烟 · 我在你身边</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --pink: #ff6b9a;
        --pink-soft: #fff0f6;
        --text-main: #4a4a4a;
        --text-sub: #888;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
            radial-gradient(circle at top, #ffe3ec, transparent 60%),
            linear-gradient(180deg, #fff5f8, #fdfbfb);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .card {
        width: 90%;
        max-width: 420px;
        padding: 30px 26px;
        border-radius: 26px;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(10px);
        box-shadow:
            0 20px 40px rgba(255, 107, 154, 0.18),
            inset 0 1px 0 rgba(255,255,255,0.6);
        text-align: center;
        animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.01); }
    }

    h1 {
        margin: 0 0 10px;
        font-size: 26px;
        color: var(--pink);
        letter-spacing: 1px;
    }

    .subtitle {
        font-size: 14px;
        color: var(--text-sub);
        margin-bottom: 26px;
        line-height: 1.8;
    }

    .circle {
        width: 150px;
        height: 150px;
        margin: 0 auto 18px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffe0ea, #fff);
        box-shadow:
            inset 0 6px 12px rgba(255,255,255,0.8),
            0 10px 20px rgba(255, 107, 154, 0.25);
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .count {
        font-size: 44px;
        font-weight: 600;
        color: #333;
        line-height: 1;
    }

    .label {
        font-size: 13px;
        color: #999;
        margin-top: 6px;
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 14px;
        border-radius: 18px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        transition: all .25s ease;
    }

    .add {
        background: linear-gradient(135deg, #ff7aa8, #ff5f8f);
        color: #fff;
        box-shadow: 0 10px 18px rgba(255,107,154,.35);
    }

    .add:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 24px rgba(255,107,154,.45);
    }

    .reset {
        background: #f7f7f7;
        color: #777;
    }

    .secret {
        background: transparent;
        color: var(--pink);
        border: 1px dashed #ffc2d3;
    }

    .hidden {
        display: none;
    }

    .totalBox {
        margin-top: 20px;
        padding: 18px;
        border-radius: 18px;
        background: var(--pink-soft);
        animation: fadeIn .6s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .footer {
        margin-top: 24px;
        font-size: 13px;
        color: #aaa;
        line-height: 1.7;
    }
</style>
</head>

<body>
<div class="card">
    <h1>慢慢戒烟</h1>
    <div class="subtitle">
        不用一下子变好。<br>
        你愿意记录，本身就很了不起。
    </div>

    <div class="circle">
        <div class="count" id="todayCount">0</div>
        <div class="label">今天抽了 · 根</div>
    </div>

    <button class="add" onclick="addCigarette()">我刚抽了一根</button>
    <button class="reset" onclick="resetToday()">今天重新开始</button>

    <div id="totalArea" class="totalBox hidden">
        <div class="label">到现在为止</div>
        <div class="count" id="totalCount">0</div>
        <div class="label">根</div>
    </div>

    <button class="secret" onclick="checkPassword()">查看累计记录</button>

    <div class="footer">
        你不是软弱，<br>
        你只是比别人更认真地活着。
    </div>
</div>

<script>
    const todayKey = "smoke_today";
    const totalKey = "smoke_total";
    const dateKey  = "smoke_date";
    const PASSWORD = "CduoD5201314";

    function getToday() {
        return new Date().toISOString().slice(0, 10);
    }

    function init() {
        const savedDate = localStorage.getItem(dateKey);
        const today = getToday();
        if (savedDate !== today) {
            localStorage.setItem(dateKey, today);
            localStorage.setItem(todayKey, "0");
        }
        updateUI();
    }

    function addCigarette() {
        let today = parseInt(localStorage.getItem(todayKey) || "0");
        let total = parseInt(localStorage.getItem(totalKey) || "0");
        today++;
        total++;
        localStorage.setItem(todayKey, today);
        localStorage.setItem(totalKey, total);
        updateUI();
    }

    function resetToday() {
        if (confirm("确定把今天清零吗？\n没关系，是温柔的新开始。")) {
            localStorage.setItem(todayKey, "0");
            updateUI();
        }
    }

    function checkPassword() {
        const input = prompt("请输入密码");
        if (input === PASSWORD) {
            document.getElementById("totalArea").classList.remove("hidden");
            updateUI();
        } else if (input !== null) {
            alert("不对哦，但你还是很棒 🌷");
        }
    }

    function updateUI() {
        document.getElementById("todayCount").innerText =
            localStorage.getItem(todayKey) || "0";
        document.getElementById("totalCount").innerText =
            localStorage.getItem(totalKey) || "0";
    }

    init();
</script>
</body>
</html>
